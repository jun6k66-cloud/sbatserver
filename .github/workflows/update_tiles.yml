name: Update Minecraft Map Tiles

on:
  workflow_dispatch: # 수동 실행
  schedule:
    - cron: '*/3 * * * *' # 3분마다 자동 실행 (원하시는 주기로 조정)

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15 # 깃허브 액션 전체 실행 시간 제한을 15분으로 확장

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 리눅스 표준 SFTP 툴(lftp) 설치
      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      # 안정적인 타일 동기화 (옵션 최적화)
      - name: Download Tiles via SFTP
        env:
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_PORT: ${{ secrets.SFTP_PORT }}
          SFTP_USER: ${{ secrets.SFTP_USERNAME }}
          SFTP_PASS: ${{ secrets.SFTP_PASSWORD }}
        run: |
          mkdir -p ./tiles
          lftp -u "$SFTP_USER","$SFTP_PASS" -p "$SFTP_PORT" sftp://"$SFTP_HOST" <<EOF
          set sftp:auto-confirm yes
          set net:timeout 30
          set net:max-retries 3
          set net:reconnect-interval-base 5
          mirror --verbose --continue --only-newer --parallel=2 /config/pl3xmap/web/tiles/ ./tiles/
          quit
          EOF

      # 변경 사항 커밋 및 푸시
      - name: Commit and Push Changes
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add tiles/
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 정기 타일 업데이트" && git push)
