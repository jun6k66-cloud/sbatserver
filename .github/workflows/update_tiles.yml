name: Update Minecraft Map Tiles

on:
  workflow_dispatch: # 깃허브 Actions 탭에서 직접 [Run workflow] 버튼으로 실행 가능
  repository_dispatch:
    types: [update_tiles] # 외부 신호(명령어)로도 실행 가능

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download New Tiles from WeirdHost
        run: |
          mkdir -p tiles
          curl -L -o tiles.zip "http://sbat.mods.kr/web/tiles" || true
          if [ -f tiles.zip ]; then
            unzip -o tiles.zip -d tiles/
            rm tiles.zip
          fi

      - name: Commit and Push Changes
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add tiles/
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 실시간 지도 타일 자동 업데이트" && git push)
