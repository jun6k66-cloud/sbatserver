name: Update Minecraft Map Tiles

on:
  workflow_dispatch: # 수동 실행
  schedule:
    - cron: '0 * * * *' # 매 시 정각 자동 실행

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 가장 안정적인 appleboy SFTP 라이브러리로 교체
      - name: Download Tiles via SFTP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SFTP_HOST }}
          port: ${{ secrets.SFTP_PORT }}
          username: ${{ secrets.SFTP_USERNAME }}
          password: ${{ secrets.SFTP_PASSWORD }}
          source: '/config/pl3xmap/web/tiles/*' # 서버 내 타일 경로
          target: './tiles/' # 깃허브 내 저장 경로
          download: true # 다운로드 모드 활성화

      # 변경 사항 커밋 및 푸시
      - name: Commit and Push Changes
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add tiles/
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 정기 타일 업데이트" && git push)
