name: Update Minecraft Map Tiles

on:
  schedule:
    # 15분마다 자동으로 실행되도록 설정 (깃허브 스케줄러 표준 크론탭)
    - cron: '*/15 * * * *'
  workflow_dispatch: # 깃허브 웹에서 [Run workflow] 버튼으로 수동 실행도 가능하게 설정

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 위어드호스트 서버로부터 최신 tiles 데이터를 직접 동기화합니다.
      # (서버 주소와 웹 포트가 할당되어 있다면 해당 경로에서 데이터를 긁어옵니다.)
      - name: Download New Tiles from WeirdHost
        run: |
          mkdir -p tiles
          curl -L -o tiles.zip "http://sbat.mods.kr/web/tiles" || true
          if [ -f tiles.zip ]; then
            unzip -o tiles.zip -d tiles/
            rm tiles.zip
          fi

      - name: Commit and Push Changes
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add tiles/
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 실시간 지도 타일 자동 업데이트" && git push)
