name: Update Minecraft Map Tiles

on:
  workflow_dispatch: # 수동 실행
  schedule:
    - cron: '0 * * * *' # 매 시 정각 자동 실행

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 리눅스 표준 SFTP 툴(lftp) 설치
      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      # 호스트 키 검증을 우회하여 서버에서 타일 다운로드
      - name: Download Tiles via SFTP
        env:
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_PORT: ${{ secrets.SFTP_PORT }}
          SFTP_USER: ${{ secrets.SFTP_USERNAME }}
          SFTP_PASS: ${{ secrets.SFTP_PASSWORD }}
        run: |
          mkdir -p ./tiles
          lftp -u "$SFTP_USER","$SFTP_PASS" -p "$SFTP_PORT" sftp://"$SFTP_HOST" <<EOF
          set sftp:auto-confirm yes
          mirror --verbose --continue --delete --parallel=5 /config/pl3xmap/web/tiles/ ./tiles/
          quit
          EOF

      # 변경 사항 커밋 및 푸시
      - name: Commit and Push Changes
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add tiles/
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 정기 타일 업데이트" && git push)
