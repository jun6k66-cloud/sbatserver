name: Update Minecraft Map Tiles

on:
  workflow_dispatch: # Actions 탭에서 수동 실행 가능
  schedule:
    # 매 시 정각마다 깃허브가 자동으로 서버를 체크하여 맵을 업데이트함
    - cron: '0 * * * *'

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # SFTP를 통해 서버에서 최신 타일 다운로드
      - name: Download Tiles via SFTP
        uses: wlixcc/SFTP-Action-Build-Execute@v1.0
        with:
          host: ${{ secrets.SFTP_HOST }}
          port: ${{ secrets.SFTP_PORT }}
          username: ${{ secrets.SFTP_USERNAME }}
          password: ${{ secrets.SFTP_PASSWORD }}
          local_path: './tiles/'
          remote_path: '/config/pl3xmap/web/tiles/'
          operation: 'download'

      # 변경 사항이 있을 때만 깃허브에 반영
      - name: Commit and Push Changes
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add tiles/
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 정기 타일 업데이트" && git push)
