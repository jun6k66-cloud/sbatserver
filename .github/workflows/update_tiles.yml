name: Update Minecraft Map Tiles

on:
  repository_dispatch:
    types: [update_tiles]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # 위어드호스트 패브릭 서버로부터 최신 tiles 데이터를 직접 긁어와 깃허브에 동기화합니다.
      - name: Download New Tiles from WeirdHost
        run: |
          mkdir -p tiles
          curl -L -o tiles.zip "http://sbat.mods.kr/web/tiles" || true
          if [ -f tiles.zip ]; then
            unzip -o tiles.zip -d tiles/
            rm tiles.zip
          fi

      - name: Commit and Push Changes
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add tiles/
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 실시간 지도 타일 자동 업데이트" && git push)
